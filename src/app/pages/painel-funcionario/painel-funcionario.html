<section class="painel-funcionario">
    <div class="painel-header">
      <h1>Painel do Funcionário</h1>
      <button class="sair-btn" (click)="sair()">Sair</button>
    </div>
  
    <div class="tabs">
      <button (click)="abaSelecionada = 'professores'" [class.active]="abaSelecionada === 'professores'">
        👨‍🏫 Professores
      </button>
      <button (click)="abaSelecionada = 'aulas'" [class.active]="abaSelecionada === 'aulas'">
        📅 Aulas
      </button>
      <button (click)="abaSelecionada = 'trocas'" [class.active]="abaSelecionada === 'trocas'">
        🔄 Trocas de Horário
      </button>
    </div>
  
    <!-- 📘 Aba de Professores -->
    <div *ngIf="abaSelecionada === 'professores'" class="content">
      <h2>Cadastro de Professores</h2>
  
      <form (submit)="adicionarProfessor($event)">
        <input type="text" placeholder="Nome do professor" [(ngModel)]="novoProfessor.nome" name="nome" required />
        <input type="text" placeholder="Modalidade (ex: Futebol Sub-15)" [(ngModel)]="novoProfessor.modalidade" name="modalidade" required />
        <button type="submit" class="submit-btn">Adicionar</button>
      </form>
  
      <ul class="lista">
        <li *ngFor="let prof of professores; let i = index">
          <span>{{ prof.nome }} — {{ prof.modalidade }}</span>
          <button (click)="removerProfessor(i)" class="remover-btn">Remover</button>
        </li>
      </ul>
    </div>
  
    <!-- 📅 Aba de Aulas (placeholder) -->
    <div *ngIf="abaSelecionada === 'aulas'" class="content">
      <h2>Registro de Aulas</h2>
      <p>(Essa parte será conectada aos professores cadastrados em breve!)</p>
    </div>
  
    <!-- 🔄 Aba de Trocas -->
    <div *ngIf="abaSelecionada === 'trocas'" class="content">
      <h2>Trocas de Horário</h2>
      <p>(Aqui serão registradas solicitações de mudança de horário.)</p>
    </div>
  </section>
